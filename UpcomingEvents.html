<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Upcoming Events - JSREC</title>

<style>

body{
font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
margin:0;
display:flex;
flex-direction:column;
min-height:100vh;
}

.bg-image{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-1;
}

header{
background:rgba(0,0,0,0.6);
color:white;
padding:30px;
text-align:center;
}

section{
padding:40px 20px;
flex:1;
}

h2{
text-align:center;
color:white;
margin-bottom:30px;
}

.event-container{
display:flex;
gap:25px;
flex-wrap:wrap;
justify-content:center;
}

.event-card{
background:rgba(255,255,255,0.9);
padding:25px;
width:280px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
transition:transform 0.3s;
}

.event-card:hover{
transform:translateY(-5px);
}

.event-card h3{
margin-top:0;
color:#1a237e;
}

footer{
background:rgba(0,0,0,0.6);
color:white;
text-align:center;
padding:15px;
}

a{
text-decoration:none;
color:inherit;
}

</style>
</head>

<body>

<img src="https://wallpapercave.com/wp/wp10715825.jpg" class="bg-image">

<header>
<h1>JSREC Events</h1>
<p>Create • Manage • Celebrate</p>
</header>

<section>

<h2>Upcoming Events</h2>

<div class="event-container">
<a href="Tech.html">
<div class="event-card">
<h3>Tech Conference 2026</h3>
<p><strong>Date:</strong> 15 March 2026</p>
<p><strong>Location:</strong> Conference Hall</p>
</div>
</a>

<div class="event-card">
<a href="Musicfest.html">
<h3>Music Fest</h3>
<p><strong>Date:</strong> 22 April 2026</p>
<p><strong>Location:</strong> Open Grounds</p>
</div>
</a>

<div class="event-card">
<a href="Business.html">
<h3>Business Workshop</h3>
<p><strong>Date:</strong> 10 May 2026</p>
<p><strong>Location:</strong> Conference Hall</p>
</div>
</a>

</div>

</section>

<footer>
<p>© 2026 JSREC Events | All Rights Reserved</p>
</footer>

</body>
</html>
