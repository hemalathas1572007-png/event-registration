<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Event Registration</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    margin: 0;
}

.bg-image {
    position: fixed;
    top:0;
    left:0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -1;
}

form {
    background: rgba(255,255,255,0.95);
    padding: 25px;
    max-width: 400px;
    margin: 60px auto;
    border-radius: 10px;
}

input, select {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
}

button {
    margin-top: 15px;
    padding: 12px;
    width: 100%;
    background: #1a237e;
    color: white;
    border: none;
}
</style>

<script>
function registerEvent() {

    let name = document.getElementById("name").value.trim();
    let email = document.getElementById("email").value.trim();
    let whatsapp = document.getElementById("whatsapp").value.trim();
    let phone = document.getElementById("phone").value.trim();
    let event = document.getElementById("event").value;

    if (!name || !email || !whatsapp || !phone || !event) {
        alert("Fill all details!");
        return false;
    }

    // Step 1: Get old data
    let users = JSON.parse(localStorage.getItem("users")) || [];

    // Step 2: Add new user
    users.push({
        name: name,
        email: email,
        whatsapp: whatsapp,
        phone: phone,
        event: event
    });

    // Step 3: Save data
    localStorage.setItem("users", JSON.stringify(users));

    alert("Registration Successful!");

    // Step 4: Redirect
    window.location.href = "RegisteredMembers.html";

    return false;
}
</script>

</head>

<body>

<img src="https://wallpapercave.com/wp/wp10715825.jpg" class="bg-image">

<h1 style="color:white;">Event Registration</h1>

<form onsubmit="return registerEvent();">

<input type="text" id="name" placeholder="Full Name">
<input type="email" id="email" placeholder="Email">
<input type="tel" id="whatsapp" placeholder="WhatsApp Number">
<input type="tel" id="phone" placeholder="Phone Number">

<select id="event">
<option value="">Select Event</option>
<option>Tech Conference 2026</option>
<option>Music Fest</option>
<option>Business Workshop</option>
</select>

<button type="submit">Register</button>

</form>

</body>
</html>
