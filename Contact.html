<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact - JSREC Events</title>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;

            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        
        .bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }

        
        header {
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 30px;
            text-align: center;
            backdrop-filter: blur(4px);
        }

        
        section {
            padding: 40px 20px;
            flex: 1;   
        }

        h2 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        
        .contact-box {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            max-width: 450px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            text-align: center;
        }

        .contact-box p {
            margin: 15px 0;
            font-size: 16px;
        }

        
        footer {
            background: rgba(0, 0, 0, 0.6);
            color: white;
            text-align: center;
            padding: 15px;
            backdrop-filter: blur(4px);
        }
    </style>
</head>

<body>

    <img src="https://wallpapercave.com/wp/wp10715825.jpg" class="bg-image" alt="Event Background">

    <header>
        <h1>JSREC Events</h1>
        <p>Contact Us</p>
    </header>

    <section>
        <h2>Get in Touch</h2>

        <div class="contact-box">
            <p><strong>Email:</strong> jsrecevents@gmail.com</p>
            <p><strong>Phone:</strong> +91 9876543210</p>
            <p><strong>Location:</strong> JSREC Campus</p>
            <p>We are happy to assist you with event details and registration queries.</p>
        </div>
    </section>

    <footer>
        <p>© 2026 JSREC Events | All Rights Reserved</p>
    </footer>

</body>
</html>
